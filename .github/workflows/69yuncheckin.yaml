name: Python CI 2

on:
  workflow_dispatch: # 手动触发
  schedule:
    - cron: '0 19 * * *'  # 19:00 (UTC) + 8小时 = 03:00 (北京时间)

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        # 将 v2 或 v3 改为 v4，支持更高版本的 Node.js
        uses: actions/checkout@v4

      - name: Set up Python
        # 将 v2 改为 v5，这是目前最稳定的版本
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # 假设你的项目有 requirements.txt    

      - name: Run Checkin Script
        env:
          # 确保你在仓库的 Settings -> Secrets 中配置了以下变量
          DOMAIN: ${{ secrets.DOMAIN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          USER1: ${{ secrets.USER1 }}
          PASS1: ${{ secrets.PASS1 }}
          USER2: ${{ secrets.USER2 }}
          PASS2: ${{ secrets.PASS2 }}
        # 确保 your_script.py 替换为你实际的 Python 文件名
        
        run: python 69yun.py
        
